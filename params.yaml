safety_controller:
  ros__parameters:
    scan_topic: "/scan"

    # Real car (mux low-level safety input — overrides navigation):
    drive_topic: "/vesc/low_level/input/safety"
    # Simulation (uncomment, comment out real car line above):
    # drive_topic: "/drive"

    # effective_ttc_threshold = ttc_base + ttc_gain * assumed_speed
    ttc_base: 0.35
    ttc_gain: 0.29

    cone_half_angle_deg: 25.0
    car_half_width: 0.25
    safe_scan_count: 3
    min_stop_distance: 0.35

drive_straight:
  ros__parameters:
    # Real car navigation input:
    drive_topic: "/vesc/input/navigation"
    # Simulation (uncomment, comment out real car line above):
    # drive_topic: "/drive"

    # !! CHANGE SPEED HERE !!
    speed: 1.4
    steering_angle: 0.0
